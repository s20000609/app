          echo "C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $version = (Invoke-WebRequest -Uri "https://vulkan.lunarg.com/sdk/latest/windows.txt" -UseBasicParsing).Content.Trim()
          $installer = Join-Path $env:TEMP "vulkan_sdk.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait
          $vkDir = "C:\VulkanSDK\$version"
          if (-not (Test-Path $vkDir)) {
            Write-Error "Vulkan SDK not found at $vkDir"
            exit 1
          }
          "VULKAN_SDK=$vkDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$vkDir\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Vulkan toolchain
        shell: pwsh
        run: |
          if (-not (Get-Command glslc -ErrorAction SilentlyContinue)) {
