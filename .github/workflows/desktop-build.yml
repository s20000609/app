  windows_rocm:
    name: Windows Build (ROCm)
    needs: prepare_release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_rocm_windows == true }}
    runs-on: blacksmith-4vcpu-windows-2025
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Install LLVM (libclang)
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ROCm HIP toolchain (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python --version
          python -m pip install --upgrade pip

          $base = "https://repo.radeon.com/rocm/windows/"
          $index = (Invoke-WebRequest -Uri $base -UseBasicParsing).Content
          $releaseTags = [regex]::Matches($index, 'rocm-rel-([0-9]+(?:\.[0-9]+)*)/') | ForEach-Object { $_.Groups[1].Value } | Sort-Object {[version]$_} -Descending
          if (-not $releaseTags -or $releaseTags.Count -eq 0) {
            throw "Could not detect ROCm Windows release tags at $base"
          }
          $releaseTag = $releaseTags[0]
          $releaseUrl = "$base" + "rocm-rel-$releaseTag/"

          $releaseIndex = (Invoke-WebRequest -Uri $releaseUrl -UseBasicParsing).Content
          $tarMatch = [regex]::Match($releaseIndex, 'href="rocm-([^"]+)\.tar\.gz"')
          if (-not $tarMatch.Success) {
            throw "Could not detect ROCm Python package version in $releaseUrl"
          }
          $rocmVersion = $tarMatch.Groups[1].Value

          Write-Host "Installing rocm[devel,libraries]==$rocmVersion from $releaseUrl"
          python -m pip install "rocm[devel,libraries]==$rocmVersion" --find-links "$releaseUrl"
          python -m rocm_sdk init

          $rocmBin = (python -m rocm_sdk path --bin).Trim()
          $rocmRoot = (python -m rocm_sdk path --root).Trim()
          if (-not (Test-Path (Join-Path $rocmBin "hipcc.bat")) -and -not (Test-Path (Join-Path $rocmBin "hipcc.exe"))) {
            throw "hipcc not found in ROCm bin path: $rocmBin"
          }
          $deviceLibFile = Get-ChildItem -Path $rocmRoot -Recurse -File -Filter "ocml.bc" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $deviceLibFile) {
            throw "Could not find ROCm device library (ocml.bc) under $rocmRoot"
          }
          $deviceLibDir = $deviceLibFile.DirectoryName

          "ROCM_PATH=$rocmRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HIP_PATH=$rocmRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HIP_PLATFORM=amd" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ROCM_DEVICE_LIB_PATH=$deviceLibDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HIP_DEVICE_LIB_PATH=$deviceLibDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$rocmRoot\lib\cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $rocmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify ROCm toolchain
        shell: pwsh
        run: |
          if (-not (Get-Command hipcc -ErrorAction SilentlyContinue)) {
            Write-Error "hipcc not found (required for llama-gpu-rocm build). Install AMD HIP SDK/ROCm on the runner image."
            exit 1
          }
          hipcc --version
          if (-not $env:ROCM_DEVICE_LIB_PATH -or -not (Test-Path (Join-Path $env:ROCM_DEVICE_LIB_PATH "ocml.bc"))) {
            Write-Error "ROCm device library path invalid: '$env:ROCM_DEVICE_LIB_PATH'"
            exit 1
          }
          Write-Host "ROCM_PATH=$env:ROCM_PATH"
          Write-Host "ROCM_DEVICE_LIB_PATH=$env:ROCM_DEVICE_LIB_PATH"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          $VERSION = "0.1.${{ github.run_number }}"

          $devConfig = @"
          {
            "`$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "`$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["nsis"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          "@
          $devConfig | Out-File -FilePath dev-config.json -Encoding UTF8

      - name: Build Tauri (Windows, llama.cpp ROCm)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD -C target-feature=-crt-static"
          CMAKE_MSVC_RUNTIME_LIBRARY: "MultiThreadedDLL"
          CMAKE_GENERATOR: "Ninja"
          CXXFLAGS: "/EHsc /clang:--rocm-path=${{ env.ROCM_PATH }} /clang:--rocm-device-lib-path=${{ env.ROCM_DEVICE_LIB_PATH }}"
          CFLAGS: "/clang:--rocm-path=${{ env.ROCM_PATH }} /clang:--rocm-device-lib-path=${{ env.ROCM_DEVICE_LIB_PATH }}"
          CMAKE_C_COMPILER: "clang-cl"
          CMAKE_CXX_COMPILER: "clang-cl"
          CMAKE_HIP_COMPILER: "hipcc"
          CMAKE_HIP_FLAGS: "--rocm-path=${{ env.ROCM_PATH }} --rocm-device-lib-path=${{ env.ROCM_DEVICE_LIB_PATH }}"
          CMAKE_HIP_PLATFORM: "amd"
          HIP_PLATFORM: "amd"
          HIP_PATH: ${{ env.HIP_PATH }}
          ROCM_PATH: ${{ env.ROCM_PATH }}
          HIP_DEVICE_LIB_PATH: ${{ env.HIP_DEVICE_LIB_PATH }}
          ROCM_DEVICE_LIB_PATH: ${{ env.ROCM_DEVICE_LIB_PATH }}
          CARGO_TARGET_DIR: target-rocm
        run: bun run tauri build --config dev-config.json --features llama-gpu-rocm

      - name: Package Windows ROCm zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path src-tauri/target-rocm/release/bundle/* -DestinationPath dist-artifacts/windows-rocm.zip -Force

      - name: Upload Windows ROCm zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: dist-artifacts/windows-rocm.zip
          fail_on_unmatched_files: true

