name: Desktop Build (Tauri)

on:
  workflow_dispatch:
    inputs:
      build_llama_cuda_linux:
        description: "Also build Linux desktop with llama.cpp CUDA support"
        required: false
        default: false
        type: boolean
      build_llama_vulkan_linux:
        description: "Also build Linux desktop with llama.cpp Vulkan support"
        required: false
        default: false
        type: boolean
      build_llama_cpu_linux:
        description: "Build Linux desktop with llama.cpp CPU"
        required: false
        default: true
        type: boolean
      build_llama_cuda_windows:
        description: "Also build Windows desktop with llama.cpp CUDA support"
        required: false
        default: false
        type: boolean
      build_llama_vulkan_windows:
        description: "Build Windows Vulkan version with llama.cpp Vulkan support"
        required: false
        default: false
        type: boolean
      build_llama_cpu_windows:
        description: "Build Windows desktop with llama.cpp CPU"
        required: false
        default: true
        type: boolean
      build_llama_cpu_macos:
        description: "Build macOS desktop with llama.cpp CPU"
        required: false
        default: true
        type: boolean
      build_llama_metal_macos:
        description: "Build macOS desktop with llama.cpp Metal support"
        required: false
        default: false
        type: boolean

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  prepare_release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      name: ${{ steps.meta.outputs.name }}
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute release metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="desktop-dev-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}"
          NAME="Desktop Dev Build #${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT} (${SHORT_SHA})"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build release body (include commits since last Desktop build)
        id: release_body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          TAG_PREFIX="desktop-dev"
          PREV_TAG=""

          print_commit_range() {
            local range="$1"
            local empty_message="$2"
            local count=0

            while IFS=$'\t' read -r sha subject; do
              [[ -z "$sha" ]] && continue
              short_sha="${sha:0:7}"
              echo "- [\`${short_sha}\`](${REPO_URL}/commit/${sha}) ${subject}"
              count=$((count + 1))
            done < <(git log --pretty=format:'%H%x09%s%n' "${range}")

            if [[ "${count}" -eq 0 ]]; then
              echo "- ${empty_message}"
            fi
          }

          PREV_SUCCESS_RUN_INFO="$(
            python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          workflow_ref = os.environ["GITHUB_WORKFLOW_REF"]
          workflow = workflow_ref.split("@", 1)[0].split("/")[-1]
          branch = os.environ["GITHUB_REF_NAME"]
          current_sha = os.environ["GITHUB_SHA"]
          current_run = int(os.environ["GITHUB_RUN_NUMBER"])
          current_attempt = int(os.environ["GITHUB_RUN_ATTEMPT"])
          token = os.environ.get("GH_TOKEN", "")

          params = urllib.parse.urlencode({
              "status": "completed",
              "event": "workflow_dispatch",
              "branch": branch,
              "per_page": 100,
          })
          url = f"https://api.github.com/repos/{repo}/actions/workflows/{workflow}/runs?{params}"

          headers = {
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          best = None
          best_same_sha = None
          for run in data.get("workflow_runs", []):
              if run.get("conclusion") != "success":
                  continue
              run_number = int(run.get("run_number") or 0)
              run_attempt = int(run.get("run_attempt") or 1)
              if run_number < current_run or (run_number == current_run and run_attempt < current_attempt):
                  key = (run_number, run_attempt)
                  if run.get("head_sha") == current_sha:
                      if best_same_sha is None or key > best_same_sha:
                          best_same_sha = key
                      continue
                  if best is None or key > best:
                      best = key

          if best is None:
              best = best_same_sha

          if best is not None:
              print(f"{best[0]}\t{best[1]}")
          PY
          )"
          if [[ -n "${PREV_SUCCESS_RUN_INFO}" ]]; then
            IFS=$'\t' read -r PREV_RUN PREV_ATTEMPT <<< "${PREV_SUCCESS_RUN_INFO}"
            PREV_TAG="$(git tag --list "${TAG_PREFIX}-${PREV_RUN}-${PREV_ATTEMPT}-*" --sort=-creatordate | head -n 1)"
            if [[ -z "${PREV_TAG}" ]]; then
              PREV_TAG="$(git tag --list "${TAG_PREFIX}-${PREV_RUN}-*" --sort=-creatordate | head -n 1)"
            fi
          fi

          BODY_DELIM="BODY_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          {
            echo "body<<${BODY_DELIM}"
            echo "Automated desktop build artifacts for commit \`${GITHUB_SHA}\`."
            echo "Workflow run: ${REPO_URL}/actions/runs/${GITHUB_RUN_ID}"
            echo

            if [[ -n "$PREV_TAG" ]]; then
              PREV_SHA="$(git rev-list -n 1 "${PREV_TAG}")"
              echo "### Changes since previous Desktop build \`${PREV_TAG}\`"
              echo "Compare: ${REPO_URL}/compare/${PREV_TAG}...${GITHUB_SHA}"
              echo

              if git merge-base --is-ancestor "${PREV_SHA}" "${GITHUB_SHA}"; then
                print_commit_range "${PREV_TAG}..${GITHUB_SHA}" "No new commits since the previous Desktop build."
              elif git merge-base --is-ancestor "${GITHUB_SHA}" "${PREV_SHA}"; then
                echo "- This build is on an older commit than the previous Desktop build."
                echo "- Commits in previous build but not this build:"
                print_commit_range "${GITHUB_SHA}..${PREV_TAG}" "No differing commits found."
              else
                echo "- Current and previous Desktop builds are on different branches."
                echo "- Commits only in this build:"
                print_commit_range "${PREV_TAG}..${GITHUB_SHA}" "No unique commits in this build."
                echo "- Commits only in previous build:"
                print_commit_range "${GITHUB_SHA}..${PREV_TAG}" "No unique commits in previous build."
              fi
            else
              echo "### Changes"
              echo "- No previous successful Desktop build tag found."
            fi
            echo "${BODY_DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          generate_release_notes: false
          body: ${{ steps.release_body.outputs.body }}

  linux_cpu:
    name: Linux Build (CPU)
    needs: prepare_release
    if: ${{ inputs.build_llama_cpu_linux == true }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            zip

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "\$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["deb"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3",
              ]
            }
          }
          EOF

      - name: Build Tauri binary (Linux, CPU)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
        run: bun run tauri build --config dev-config.json --no-bundle

      - name: Bundle Linux CPU deb
        timeout-minutes: 20
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
        run: bun run tauri bundle --config dev-config.json --bundles deb

      - name: Package Linux CPU bundle zip
        run: |
          mkdir -p dist-artifacts
          cd src-tauri/target/release/bundle
          zip -r ../../../../dist-artifacts/linux-cpu.zip .

      - name: Upload Linux CPU zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: dist-artifacts/linux-cpu.zip
          fail_on_unmatched_files: true

  linux_cuda:
    name: Linux Build (CUDA)
    needs: prepare_release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_cuda_linux == true }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            zip

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "13.1.0"
          method: "network"

      - name: Verify CUDA toolchain
        run: |
          command -v nvcc >/dev/null 2>&1 || {
            echo "nvcc not found (required for llama-gpu-cuda build).";
            exit 1;
          }
          nvcc --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "\$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["deb"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3",
                "./onnxruntime"
              ]
            }
          }
          EOF

      - name: Build Tauri binary (Linux, llama.cpp CUDA)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: target-cuda
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
          CMAKE_CUDA_FLAGS: "--compiler-options=-fPIC"
        run: bun run tauri build --config dev-config.json --features llama-gpu-cuda --no-bundle

      - name: Bundle Linux CUDA deb
        timeout-minutes: 20
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: target-cuda
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
          CMAKE_CUDA_FLAGS: "--compiler-options=-fPIC"
        run: bun run tauri bundle --config dev-config.json --features llama-gpu-cuda --bundles deb

      - name: Package Linux CUDA bundle zip
        run: |
          mkdir -p dist-artifacts
          cd src-tauri/target-cuda/release/bundle
          zip -r ../../../../dist-artifacts/linux-cuda.zip .

      - name: Upload Linux CUDA zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: dist-artifacts/linux-cuda.zip
          fail_on_unmatched_files: true

  linux_vulkan:
    name: Linux Build (Vulkan)
    needs: prepare_release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_vulkan_linux == true }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            libvulkan-dev \
            glslc \
            patchelf \
            zip

      - name: Verify Vulkan toolchain
        run: |
          pkg-config --exists vulkan || {
            echo "Vulkan development files not found via pkg-config.";
            exit 1;
          }
          command -v glslc >/dev/null 2>&1 || {
            echo "glslc not found (required for llama-gpu-vulkan build).";
            exit 1;
          }
          glslc --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "\$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["deb"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          EOF

      - name: Build Tauri binary (Linux, llama.cpp Vulkan)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: target-vulkan
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
        run: bun run tauri build --config dev-config.json --features llama-gpu-vulkan --no-bundle

      - name: Bundle Linux Vulkan deb
        timeout-minutes: 20
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: target-vulkan
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
        run: bun run tauri bundle --config dev-config.json --features llama-gpu-vulkan --bundles deb

      - name: Package Linux Vulkan bundle zip
        run: |
          mkdir -p dist-artifacts
          cd src-tauri/target-vulkan/release/bundle
          zip -r ../../../../dist-artifacts/linux-vulkan.zip .

      - name: Upload Linux Vulkan zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: dist-artifacts/linux-vulkan.zip
          fail_on_unmatched_files: true

  windows_cpu:
    name: Windows Build (CPU)
    needs: prepare_release
    if: ${{ inputs.build_llama_cpu_windows == true }}
    runs-on: blacksmith-4vcpu-windows-2025
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install LLVM (libclang)
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          $VERSION = "0.1.${{ github.run_number }}"

          $devConfig = @"
          {
            "`$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "`$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["nsis"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          "@
          $devConfig | Out-File -FilePath dev-config.json -Encoding UTF8

      - name: Build Tauri (Windows, CPU)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD -C target-feature=-crt-static"
          CMAKE_MSVC_RUNTIME_LIBRARY: "MultiThreadedDLL"
        run: bun run tauri build --config dev-config.json

      - name: Package Windows CPU zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path src-tauri/target/release/bundle/* -DestinationPath dist-artifacts/windows-cpu.zip -Force

      - name: Upload Windows CPU zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: dist-artifacts/windows-cpu.zip
          fail_on_unmatched_files: true

  windows_cuda:
    name: Windows Build (CUDA)
    needs: prepare_release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_cuda_windows == true }}
    runs-on: blacksmith-4vcpu-windows-2025
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install LLVM (libclang)
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "13.1.0"
          method: "network"

      - name: Verify CUDA toolchain
        shell: pwsh
        run: |
          if (-not (Get-Command nvcc -ErrorAction SilentlyContinue)) {
