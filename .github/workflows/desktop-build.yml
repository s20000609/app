          method: "network"

      - name: Verify CUDA toolchain
        shell: pwsh
        run: |
          if (-not (Get-Command nvcc -ErrorAction SilentlyContinue)) {
            Write-Error "nvcc not found (required for llama-gpu-cuda build)."
            exit 1
          }
          nvcc --version

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
