            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            libvulkan-dev \
            vulkan-tools \
            libshaderc-dev \
            glslc \
            glslang-tools \
            zip

      - name: Verify Vulkan shader toolchain
        run: |
          command -v glslc >/dev/null 2>&1 || {
            echo "glslc not found (required by FindVulkan).";
            echo "Install package 'glslc' (from shaderc) for this runner image.";
            exit 1;
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
